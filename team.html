<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elite Social Club | Teams</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%2322c55e'/><text x='50' y='65' font-family='Arial' font-weight='bold' font-size='35' fill='white' text-anchor='middle'>ESC</text></svg>">
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/navbar.css" />
    <link rel="stylesheet" href="css/footer.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Notice Bar -->
    <div id="notice-placeholder"></div>

    <!-- Navbar -->
    <div id="navbar-placeholder"></div>

    <!-- Dark Overlay for Mobile Menu -->
    <div class="nav-overlay" id="nav-overlay"></div>

    <main class="container">
      <!-- Hero Section -->
      <section class="teams-caption">
        <h1>FIRST XI ROSTER</h1>
        <p>
          Meet the core squad representing Elite Social Club. Comprehensive static
          performance tracking
        </p>
        <p>performance across all formats.</p>
      </section>

      <div class="top-bar">
        <div class="filter-tabs">
          <button class="tab active" data-filter="all-players">
            All Players
          </button>
          <button class="tab" data-filter="batsmen">Batsmen</button>
          <button class="tab" data-filter="bowlers">Bowlers</button>
          <button class="tab" data-filter="all-rounders">All-Rounders</button>
        </div>

        <div class="search-box">
          <span class="icon">
            <!-- Search SVG -->
            <svg width="16" height="16" viewBox="0 0 24 24">
              <path
                fill="currentColor"
                d="M10 2a8 8 0 105.293 14.293l4.707 4.707 1.414-1.414-4.707-4.707A8 8 0 0010 2zm0 2a6 6 0 110 12 6 6 0 010-12z"
              />
            </svg>
          </span>
          <input type="text" id="player-search" placeholder="Search player..." />
        </div>
      </div>

      <div class="players-grid" id="players-container">
          <!-- Players will be loaded here -->
      </div>
    </main>

    <div id="footer-placeholder"></div>

    <script type="module">
      import { initNavbar } from "./js/navbar.js";
      import { supabase } from "./js/supabase_client.js";

      async function loadComponent(id, file) {
        try {
          const res = await fetch(file);
          if (!res.ok) throw new Error(`Failed to load ${file}`);
          const content = await res.text();
          const element = document.getElementById(id);
          if (element) {
              element.innerHTML = content;
          }
          return content;
        } catch (error) {
          console.error("Error:", error.message);
        }
      }

      async function fetchPlayers() {
        const { data, error } = await supabase
          .from('player_stats')
          .select('*')
          .order('name');
        
        if (error) {
          console.error('Error fetching players:', error);
          return [];
        }
        return data;
      }

      async function initApp() {
        await loadComponent("notice-placeholder", "components/notice-ticker.html");
        await loadComponent("navbar-placeholder", "components/navbar.html");
        initNavbar();
        await loadComponent("footer-placeholder", "components/footer.html");

        const container = document.getElementById("players-container");
        const playerCardHtml = await (await fetch("components/player_card.html")).text();
        
        const players = await fetchPlayers();

        if (players.length === 0) {
          container.innerHTML = '<p class="no-players">No players found.</p>';
        } else {
          container.innerHTML = players.map(p => {
              let card = playerCardHtml;
              card = card.replace(/data-category="[^"]*"/, `data-category="${p.category}"`);
              card = card.replace('A. Sharma', p.name);
              card = card.replace('Batsman (RHB)', p.role || '');
              card = card.replace('(C)', p.tag || '');
              card = card.replace('https://via.placeholder.com/60', p.image_url || 'https://via.placeholder.com/60');
              card = card.replace('2,451', p.runs.toLocaleString());
              card = card.replace('45.3', p.batting_avg);
              card = card.replace('112*', p.highest_score);
              card = card.replace('135.2', p.strike_rate);
              card = card.replace('<a href="#">View Full Profile →</a>', `<a href="player-profile.html?id=${p.id}">View Full Profile →</a>`);
              return card;
          }).join('');
        }

        initFilters();
      }

      function initFilters() {
        const tabs = document.querySelectorAll(".tab");
        const searchInput = document.getElementById("player-search");

        function filterPlayers() {
          const activeFilter = document.querySelector(".tab.active").getAttribute("data-filter");
          const searchQuery = searchInput.value.toLowerCase();
          const cards = document.querySelectorAll(".player-card");

          cards.forEach(card => {
            const category = card.getAttribute("data-category");
            const name = card.querySelector("h3").textContent.toLowerCase();
            
            const matchesTab = activeFilter === "all-players" || category === activeFilter;
            const matchesSearch = name.includes(searchQuery);

            if (matchesTab && matchesSearch) {
              card.style.display = "block";
            } else {
              card.style.display = "none";
            }
          });
        }

        tabs.forEach(tab => {
          tab.addEventListener("click", () => {
            tabs.forEach(t => t.classList.remove("active"));
            tab.classList.add("active");
            filterPlayers();
          });
        });

        searchInput.addEventListener("input", filterPlayers);
      }

      initApp();
    </script>
  </body>
</html>
