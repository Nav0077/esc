<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elite Social Club | Teams</title>
    <meta name="description" content="Meet the Elite Social Club squad. Explore player profiles, batting and bowling stats, and performance metrics.">
    <meta property="og:title" content="Elite Social Club | First XI Roster">
    <meta property="og:description" content="Detailed player statistics and team roster.">
    <meta property="og:url" content="https://elite-social-club.vercel.app/team.html">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%2322c55e'/><text x='50' y='65' font-family='Arial' font-weight='bold' font-size='35' fill='white' text-anchor='middle'>ESC</text></svg>">
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/navbar.css" />
    <link rel="stylesheet" href="css/footer.css" />
    <link rel="stylesheet" href="css/cookies.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Notice Bar -->
    <div id="notice-placeholder"></div>

    <!-- Navbar -->
    <div id="navbar-placeholder"></div>

    <!-- Dark Overlay for Mobile Menu -->
    <div class="nav-overlay" id="nav-overlay"></div>

    <main class="container">
      <!-- Hero Section -->
      <section class="teams-caption">
        <h1>FIRST XI ROSTER</h1>
        <p>
          Meet the core squad representing Elite Social Club. Comprehensive static
          performance tracking
        </p>
        <p>performance across all formats.</p>
      </section>

      <div class="top-bar">
        <div class="filter-tabs">
          <button class="tab active" data-filter="all-players">
            All Players
          </button>
          <button class="tab" data-filter="batsmen">Batsmen</button>
          <button class="tab" data-filter="bowlers">Bowlers</button>
          <button class="tab" data-filter="all-rounders">All-Rounders</button>
        </div>

        <div class="search-box">
          <span class="icon">
            <!-- Search SVG -->
            <svg width="16" height="16" viewBox="0 0 24 24">
              <path
                fill="currentColor"
                d="M10 2a8 8 0 105.293 14.293l4.707 4.707 1.414-1.414-4.707-4.707A8 8 0 0010 2zm0 2a6 6 0 110 12 6 6 0 010-12z"
              />
            </svg>
          </span>
          <input type="text" id="player-search" placeholder="Search player..." />
        </div>
      </div>

      <div class="players-grid" id="players-container">
          <!-- Players will be loaded here -->
      </div>
    </main>

    <div id="footer-placeholder"></div>

    <script type="module">
      import { initNavbar } from "./js/navbar.js";
      import { supabase } from "./js/supabase_client.js";
      import { initGA } from './js/analytics.js';
      import { initCookies } from './js/cookies.js';

      async function loadComponent(id, file) {
        try {
          const res = await fetch(file);
          if (!res.ok) throw new Error(`Failed to load ${file}`);
          const content = await res.text();
          const element = document.getElementById(id);
          if (element) {
              element.innerHTML = '';
              const range = document.createRange();
              const fragment = range.createContextualFragment(content);
              element.appendChild(fragment);
          }
          return content;
        } catch (error) {
          console.error("Error:", error.message);
        }
      }

      async function fetchPlayers() {
        const { data, error } = await supabase
          .from('player_stats')
          .select('id, name, role, category, tag, image_url, matches, runs, batting_avg, strike_rate, highest_score, wickets, bowling_avg, best_bowling, recent_form')
          .order('name');
        
        if (error) {
          console.error('Error fetching players:', error);
          return [];
        }
        return data;
      }

      async function initApp() {
        initGA();
        initCookies();
        const componentPromises = [
            loadComponent("notice-placeholder", "components/notice-ticker.html"),
            loadComponent("navbar-placeholder", "components/navbar.html"),
            loadComponent("footer-placeholder", "components/footer.html")
        ];

        const dataPromises = [
            fetchPlayers(),
            fetch("components/player_card.html").then(r => r.text())
        ];

        await Promise.all(componentPromises);
        initNavbar();

        const [players, playerCardHtml] = await Promise.all(dataPromises);
        const container = document.getElementById("players-container");

        if (players.length === 0) {
          container.innerHTML = '<p class="no-players">No players found.</p>';
        } else {
          container.innerHTML = players.map(p => {
              let card = playerCardHtml;
              const replacements = {
                  '{{ID}}': p.id,
                  '{{CATEGORY}}': p.category || 'all-rounders',
                  '{{NAME}}': p.name || 'Unknown',
                  '{{ROLE}}': p.role || 'Player',
                  '{{TAG}}': p.tag || '',
                  '{{IMAGE_URL}}': p.image_url || "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23e5e7eb'/><circle cx='50' cy='38' r='20' fill='%239ca3af'/><path d='M50 62c-20 0-36 10-36 22v6h72v-6c0-12-16-22-36-22z' fill='%239ca3af'/></svg>",
                  '{{MAT}}': p.matches || '0',
                  '{{RUNS}}': (p.runs || 0).toLocaleString(),
                  '{{WKTS}}': p.wickets || '0',
                  '{{AVG}}': p.batting_avg || '-',
                  '{{HS}}': p.highest_score || '-',
                  '{{SR}}': p.strike_rate || '-',
                  '{{BW_AVG}}': p.bowling_avg || '-',
                  '{{BEST}}': p.best_bowling || '-',
                  '{{RECENT_FORM}}': (p.recent_form || []).slice(0, 5).map(f => `
                    <div class="form-dot ${f.is_not_out ? 'not-out' : ''}" title="vs ${f.opponent}">
                        ${f.runs}${f.is_not_out ? '*' : ''}
                        ${f.balls ? `<span class="balls">${f.balls}</span>` : ''}
                    </div>
                  `).join('') || '<span style="font-size:10px; color:#999;">N/A</span>'
              };
              Object.keys(replacements).forEach(key => {
                  card = card.split(key).join(replacements[key]);
              });
              return card;
          }).join('');
        }

        initFilters();
      }

      function initFilters() {
        const tabs = document.querySelectorAll(".tab");
        const searchInput = document.getElementById("player-search");

        function filterPlayers() {
          const activeFilter = document.querySelector(".tab.active").getAttribute("data-filter");
          const searchQuery = searchInput.value.toLowerCase();
          const cards = document.querySelectorAll(".player-card");

          cards.forEach(card => {
            const category = card.getAttribute("data-category");
            const name = card.querySelector("h3").textContent.toLowerCase();
            
            const matchesTab = activeFilter === "all-players" || category === activeFilter;
            const matchesSearch = name.includes(searchQuery);

            if (matchesTab && matchesSearch) {
              card.style.display = "block";
            } else {
              card.style.display = "none";
            }
          });
        }

        tabs.forEach(tab => {
          tab.addEventListener("click", () => {
            tabs.forEach(t => t.classList.remove("active"));
            tab.classList.add("active");
            filterPlayers();
          });
        });

        searchInput.addEventListener("input", filterPlayers);
      }

      initApp();
    </script>
  </body>
</html>
