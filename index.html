<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="03vyWY-I5B1elt1quzQVlWq7QYF708rDwmBKOU8GLUg" />
    <title>Elite Social Club | Home</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%2322c55e'/><text x='50' y='65' font-family='Arial' font-weight='bold' font-size='35' fill='white' text-anchor='middle'>ESC</text></svg>">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/popup.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Notice Bar -->
    <div id="notice-placeholder"></div>

    <!-- Navbar -->
    <div id="navbar-placeholder"></div>

    <!-- Dark Overlay for Mobile Menu -->
    <div class="nav-overlay" id="nav-overlay"></div>

    <main class="container">
        <!-- Hero Section -->
        <section class="hero">
            <h1>WELCOME TO <span class="highlight">ELITE SOCIAL CLUB</span></h1>
            <p>Your premier destination for data-driven cricket analytics and live match updates.</p>
        </section>

        <!-- Matches Section -->
        <section class="matches-section">
            <div class="section-header">
                <h2>Live & Recent Matches</h2>
                <a href="#" class="view-all">View All</a>
            </div>
            <div class="matches-grid">
                <div id="live-card"></div>
                <div id="finished-card"></div>
                <div id="upcoming-card"></div>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>
    <div id="popup-placeholder"></div>

   <script type="module">
        import { initNavbar } from './js/navbar.js';
        import { supabase } from "./js/supabase_client.js";

        // Load Component Function
        async function loadComponent(id, file) {
            try {
                const res = await fetch(file);
                if (!res.ok) throw new Error(`Failed to load ${file}`);
                const content = await res.text();
                const element = document.getElementById(id);
                if (element) {
                    element.innerHTML = ''; 
                    const range = document.createRange();
                    const fragment = range.createContextualFragment(content);
                    element.appendChild(fragment);
                }
                return content;
            } catch (error) {
                console.error(' Error:', error.message);
            }
        }

        async function fetchMatches() {
            const { data, error } = await supabase
                .from('matches')
                .select('*')
                .order('match_date', { ascending: true });
            
            if (error) {
                console.error('Error fetching matches:', error);
                return [];
            }
            return data;
        }

        function renderMatchCard(match, template) {
            let card = template;
            const replacements = {
                '{{TOURNAMENT_NAME}}': match.tournament_name || 'Tournament',
                '{{MATCH_NUMBER}}': match.match_number || '',
                '{{TEAM1_NAME}}': match.team1_name || 'Team 1',
                '{{TEAM2_NAME}}': match.team2_name || 'Team 2',
                '{{TEAM1_LOGO}}': match.team1_logo || 'https://via.placeholder.com/24',
                '{{TEAM2_LOGO}}': match.team2_logo || 'https://via.placeholder.com/24',
                '{{TEAM1_SCORE}}': match.team1_score || '-',
                '{{TEAM2_SCORE}}': match.team2_score || 'Yet to bat',
                '{{TEAM1_OVERS}}': match.team1_overs ? `(${match.team1_overs})` : '',
                '{{TEAM2_OVERS}}': match.team2_overs ? `(${match.team2_overs})` : '',
                '{{SUMMARY}}': match.summary || ''
            };

            Object.keys(replacements).forEach(key => {
                card = card.split(key).join(replacements[key]);
            });

            return `<a href="scoreboard.html?id=${match.id}" style="text-decoration: none; color: inherit; display: block;">${card}</a>`;
        }

        //  Initialize App
        async function initApp() {
            await loadComponent('notice-placeholder', 'components/notice-ticker.html');
            await loadComponent('navbar-placeholder', 'components/navbar.html');
            initNavbar(); 
            await loadComponent('footer-placeholder', 'components/footer.html');

            const matches = await fetchMatches();
            
            const liveTemplate = await (await fetch('components/card-live.html')).text();
            const finishedTemplate = await (await fetch('components/card-finished.html')).text();
            const upcomingTemplate = await (await fetch('components/card-upcoming.html')).text();

            const liveContainer = document.getElementById('live-card');
            const finishedContainer = document.getElementById('finished-card');
            const upcomingContainer = document.getElementById('upcoming-card');

            const liveMatch = matches.find(m => m.status === 'live');
            const finishedMatch = matches.find(m => m.status === 'finished');
            const upcomingMatch = matches.find(m => m.status === 'upcoming');

            if (liveMatch && liveContainer) {
                liveContainer.innerHTML = renderMatchCard(liveMatch, liveTemplate);
            }
            if (finishedMatch && finishedContainer) {
                finishedContainer.innerHTML = renderMatchCard(finishedMatch, finishedTemplate);
            }
            if (upcomingMatch && upcomingContainer) {
                upcomingContainer.innerHTML = renderMatchCard(upcomingMatch, upcomingTemplate);
            }

            // Handle Promo Popup
            await loadComponent('popup-placeholder', 'components/promo-popup.html');
            const { data: popups, error: popupError } = await supabase
                .from('popups')
                .select('*')
                .eq('is_active', true)
                .order('created_at', { ascending: false })
                .limit(1);

            if (!popupError && popups && popups.length > 0) {
                if (window.initPromoPopup) {
                    window.initPromoPopup(popups[0]);
                }
            }
        }

        initApp();
    </script>

</body>
</html>
