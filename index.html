<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Social Club | Home</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/footer.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Notice Bar -->
    <div id="notice-placeholder"></div>

    <!-- Navbar -->
    <div id="navbar-placeholder"></div>

    <!-- Dark Overlay for Mobile Menu -->
    <div class="nav-overlay" id="nav-overlay"></div>

    <main class="container">
        <!-- Hero Section -->
        <section class="hero">
            <h1>WELCOME TO <span class="highlight">ELITE SOCIAL CLUB</span></h1>
            <p>Your premier destination for data-driven cricket analytics and live match updates.</p>
        </section>

        <!-- Matches Section -->
        <section class="matches-section">
            <div class="section-header">
                <h2>Live & Recent Matches</h2>
                <a href="#" class="view-all">View All</a>
            </div>
            <div class="matches-grid">
                <div id="live-card"></div>
                <div id="finished-card"></div>
                <div id="upcoming-card"></div>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>

   <script type="module">
    import { initNavbar } from './js/navbar.js'; // Ensure the path to navbar.js is correct

    // Load Component Function
    async function loadComponent(id, file) {
        try {
            const res = await fetch(file);
            if (!res.ok) throw new Error(`Failed to load ${file}`);
            document.getElementById(id).innerHTML = await res.text();
        } catch (error) {
            console.error(' Error:', error.message);
        }
    }

    //  Initialize App
    async function initApp() {
        // 1. Load Navbar and other UI basics
        await loadComponent('notice-placeholder', 'components/notice-ticker.html');
        
        // We MUST wait for the navbar to load before calling initNavbar()
        await loadComponent('navbar-placeholder', 'components/navbar.html');
        initNavbar(); 

        await loadComponent('footer-placeholder', 'components/footer.html');

        // 2. Load Match Page Content (Cards)
        // These load in the background while the user sees the navbar
        Promise.all([
            loadComponent('live-card', 'components/card-live.html'),
            loadComponent('finished-card', 'components/card-finished.html'),
            loadComponent('upcoming-card', 'components/card-upcoming.html')
        ]);
    }

    // Start
    initApp();
</script>

</body>
</html>
