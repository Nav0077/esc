<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="03vyWY-I5B1elt1quzQVlWq7QYF708rDwmBKOU8GLUg" />
    <title>Elite Social Club | Home</title>
    <meta name="description" content="Elite Social Club - Your premier destination for data-driven cricket analytics, live matches, and club updates.">
    <meta name="keywords" content="Elite Social Club, Cricket, Analytics, Live Scores, Matches, Tournament">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://elite-social-club.vercel.app/">
    <meta property="og:title" content="Elite Social Club">
    <meta property="og:description" content="Teams, players, and live match updates. Data-driven cricket analytics.">
    <meta property="og:image" content="https://dkilinxmpzjkedwevhkn.supabase.co/storage/v1/object/public/banners/esc_og_image.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://elite-social-club.vercel.app/">
    <meta property="twitter:title" content="Elite Social Club">
    <meta property="twitter:description" content="Teams, players, and live match updates. Data-driven cricket analytics.">
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%2322c55e'/><text x='50' y='65' font-family='Arial' font-weight='bold' font-size='35' fill='white' text-anchor='middle'>ESC</text></svg>">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/popup.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Notice Bar -->
    <div id="notice-placeholder"></div>

    <!-- Navbar -->
    <div id="navbar-placeholder"></div>

    <!-- Dark Overlay for Mobile Menu -->
    <div class="nav-overlay" id="nav-overlay"></div>

    <main class="container">
        <!-- Hero Section -->
        <section class="hero">
            <h1>WELCOME TO <span class="highlight">ELITE SOCIAL CLUB</span></h1>
            <p>Your premier destination for data-driven cricket analytics and live match updates.</p>
        </section>

        <!-- Matches Section -->
        <section class="matches-section">
            <div class="section-header">
                <h2>Live & Recent Matches</h2>
                <a href="#" class="view-all">View All</a>
            </div>
            <div class="matches-grid">
                <div id="live-card"></div>
                <div id="finished-card"></div>
                <div id="upcoming-card"></div>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>
    <div id="popup-placeholder"></div>

   <script type="module">
        import { initNavbar } from './js/navbar.js';
        import { supabase } from "./js/supabase_client.js";

        // Load Component Function
        async function loadComponent(id, file) {
            try {
                const res = await fetch(file);
                if (!res.ok) throw new Error(`Failed to load ${file}`);
                const content = await res.text();
                const element = document.getElementById(id);
                if (element) {
                    element.innerHTML = ''; 
                    const range = document.createRange();
                    const fragment = range.createContextualFragment(content);
                    element.appendChild(fragment);
                }
                return content;
            } catch (error) {
                console.error(' Error:', error.message);
            }
        }

        // Parallel fetching of components and data
        async function initApp() {
            // 1. Start loading essential components in parallel
            const componentPromises = [
                loadComponent('notice-placeholder', 'components/notice-ticker.html'),
                loadComponent('navbar-placeholder', 'components/navbar.html'),
                loadComponent('footer-placeholder', 'components/footer.html'),
                loadComponent('popup-placeholder', 'components/promo-popup.html')
            ];

            // 2. Start fetching data and match templates in parallel
            const dataPromises = [
                fetchMatches(),
                fetch('components/card-live.html').then(r => r.text()),
                fetch('components/card-finished.html').then(r => r.text()),
                fetch('components/card-upcoming.html').then(r => r.text()),
                // Fetch the latest active popup
                supabase.from('popups').select('id, title, image_urls, link_url, display_frequency').eq('is_active', true).order('created_at', { ascending: false }).limit(1)
            ];

            // Wait for essential UI components
            await Promise.all(componentPromises);
            initNavbar();

            // Wait for data and templates
            const [matches, liveTemplate, finishedTemplate, upcomingTemplate, popupRes] = await Promise.all(dataPromises);

            // 3. Render Match Cards
            const liveContainer = document.getElementById('live-card');
            const finishedContainer = document.getElementById('finished-card');
            const upcomingContainer = document.getElementById('upcoming-card');

            const liveMatch = matches.find(m => m.status === 'live');
            const finishedMatch = matches.find(m => m.status === 'finished');
            const upcomingMatch = matches.find(m => m.status === 'upcoming');

            if (liveMatch && liveContainer) liveContainer.innerHTML = renderMatchCard(liveMatch, liveTemplate);
            if (finishedMatch && finishedContainer) finishedContainer.innerHTML = renderMatchCard(finishedMatch, finishedTemplate);
            if (upcomingMatch && upcomingContainer) upcomingContainer.innerHTML = renderMatchCard(upcomingMatch, upcomingTemplate);

            // 4. Initialize Promo Popup
            if (popupRes.data && popupRes.data.length > 0) {
                if (window.initPromoPopup) {
                    window.initPromoPopup(popupRes.data[0]);
                }
            }
        }

        async function fetchMatches() {
            const { data, error } = await supabase
                .from('matches')
                .select('id, tournament_name, match_number, team1_name, team2_name, team1_logo, team2_logo, team1_score, team2_score, team1_overs, team2_overs, summary, status')
                .order('match_date', { ascending: true });
            
            if (error) {
                console.error('Error fetching matches:', error);
                return [];
            }
            return data;
        }

        function renderMatchCard(match, template) {
            let card = template;
            const replacements = {
                '{{TOURNAMENT_NAME}}': match.tournament_name || 'Tournament',
                '{{MATCH_NUMBER}}': match.match_number || '',
                '{{TEAM1_NAME}}': match.team1_name || 'Team 1',
                '{{TEAM2_NAME}}': match.team2_name || 'Team 2',
                '{{TEAM1_LOGO}}': match.team1_logo || 'https://via.placeholder.com/24',
                '{{TEAM2_LOGO}}': match.team2_logo || 'https://via.placeholder.com/24',
                '{{TEAM1_SCORE}}': match.team1_score || '-',
                '{{TEAM2_SCORE}}': match.team2_score || 'Yet to bat',
                '{{TEAM1_OVERS}}': match.team1_overs ? `(${match.team1_overs})` : '',
                '{{TEAM2_OVERS}}': match.team2_overs ? `(${match.team2_overs})` : '',
                '{{SUMMARY}}': match.summary || ''
            };

            Object.keys(replacements).forEach(key => {
                card = card.split(key).join(replacements[key]);
            });

            return `<a href="scoreboard.html?id=${match.id}" style="text-decoration: none; color: inherit; display: block;">${card}</a>`;
        }

        initApp();
    </script>

</body>
</html>
