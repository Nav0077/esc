<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Social Club | Scorecard</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%2322c55e'/><text x='50' y='65' font-family='Arial' font-weight='bold' font-size='35' fill='white' text-anchor='middle'>ESC</text></svg>">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/scoreboard.css">
    <link rel="stylesheet" href="css/cookies.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Notice Bar -->
    <div id="notice-placeholder"></div>

    <!-- Navbar -->
    <div id="navbar-placeholder"></div>

    <!-- Dark Overlay for Mobile Menu -->
    <div class="nav-overlay" id="nav-overlay"></div>

    <main class="container">
        <div id="scoreboard-container" class="scoreboard-container" style="display: none;">
            
            <!-- Match Header -->
            <div class="match-header-info">
                <h1 id="match-title">Loading Match...</h1>
                <div class="match-status" id="match-status-text"></div>
                <div id="match-info-details" class="match-info-bar">
                    <!-- Dynamic Info -->
                </div>
            </div>

            <div id="innings-wrapper"></div>

        </div>

        <div id="loading-state" style="text-align: center; padding: 100px;">
            <p>Loading scorecard...</p>
        </div>
        <div id="error-state" style="display: none; text-align: center; padding: 100px; color: red;">
            <p>Failed to load scorecard or match not found.</p>
        </div>
        <div id="no-data-state" style="display: none; text-align: center; padding: 100px;">
            <p>Scorecard data is not available for this match yet.</p>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script type="module">
        import { initNavbar } from "./js/navbar.js";
        import { supabase } from "./js/supabase_client.js";
        import { initGA } from './js/analytics.js';
        import { initCookies } from './js/cookies.js';

        async function loadComponent(id, file) {
            try {
                const res = await fetch(file);
                if (!res.ok) throw new Error(`Failed to load ${file}`);
                const content = await res.text();
                const element = document.getElementById(id);
                if (element) {
                    element.innerHTML = '';
                    const range = document.createRange();
                    const fragment = range.createContextualFragment(content);
                    element.appendChild(fragment);
                }
                return content;
            } catch (error) {
                console.error("Error loading component:", error);
            }
        }

        // Global Player Mapping
        let playerMap = {};
        const defaultMaleAvatar = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23e5e7eb'/><circle cx='50' cy='38' r='20' fill='%239ca3af'/><path d='M50 62c-20 0-36 10-36 22v6h72v-6c0-12-16-22-36-22z' fill='%239ca3af'/></svg>";


        function renderBattingRows(battingArray) {
            if (!battingArray || battingArray.length === 0) return '<tr><td colspan="7">No batting data</td></tr>';
            return battingArray.map(b => {
                const playerObj = b.id ? { id: b.id, image_url: b.image_url } : playerMap[b.name.toLowerCase().trim()];
                const hasProfile = playerObj && playerObj.id;
                const pUrl = hasProfile ? `player-profile.html?id=${playerObj.id}` : '#';
                const pImg = (playerObj && playerObj.image_url) ? playerObj.image_url : defaultMaleAvatar;
                const avatarHtml = `<img src="${pImg}" class="scorecard-player-avatar" style="width: 24px; height: 24px; border-radius: 50%; object-fit: cover; border: 1px solid #d1d5db; background: #e5e7eb; flex-shrink: 0;">`;

                return `
                    <tr>
                        <td>
                            <div style="display: flex; align-items: center; gap: 8px;">
                                ${avatarHtml}
                                ${hasProfile ? `<a href="${pUrl}" class="player-name">${b.name}</a>` : `<span class="player-name-static" style="font-weight: 500; color: #374151;">${b.name}</span>`}
                            </div>
                        </td>
                        <td class="dismissal">${b.status || ''}</td>
                        <td class="num runs-bold">${b.runs ?? 0}</td>
                        <td class="num">${b.balls ?? 0}</td>
                        <td class="num">${b.fours ?? 0}</td>
                        <td class="num">${b.sixes ?? 0}</td>
                        <td class="num">${b.sr ?? '0.00'}</td>
                    </tr>
                `;
            }).join('');
        }

        function renderBowlingRows(bowlingArray) {
            if (!bowlingArray || bowlingArray.length === 0) return '<tr><td colspan="8">No bowling data</td></tr>';
            return bowlingArray.map(b => {
                const playerObj = b.id ? { id: b.id, image_url: b.image_url } : playerMap[b.name.toLowerCase().trim()];
                const hasProfile = playerObj && playerObj.id;
                const pUrl = hasProfile ? `player-profile.html?id=${playerObj.id}` : '#';
                const pImg = (playerObj && playerObj.image_url) ? playerObj.image_url : defaultMaleAvatar;
                const avatarHtml = `<img src="${pImg}" class="scorecard-player-avatar" style="width: 24px; height: 24px; border-radius: 50%; object-fit: cover; border: 1px solid #d1d5db; background: #e5e7eb; flex-shrink: 0;">`;

                return `
                    <tr>
                        <td>
                            <div style="display: flex; align-items: center; gap: 8px;">
                                ${avatarHtml}
                                ${hasProfile ? `<a href="${pUrl}" class="player-name">${b.name}</a>` : `<span class="player-name-static" style="font-weight: 500; color: #374151;">${b.name}</span>`}
                            </div>
                        </td>
                        <td class="num">${b.overs ?? '0.0'}</td>
                        <td class="num">${b.maidens ?? 0}</td>
                        <td class="num runs-bold">${b.runs ?? 0}</td>
                        <td class="num runs-bold" style="color: #cb202d;">${b.wkts ?? 0}</td>
                        <td class="num">0</td>
                        <td class="num">0</td>
                        <td class="num">${b.econ ?? '0.00'}</td>
                    </tr>
                `;
            }).join('');
        }

        function generateInningsHTML(inningsData) {
            if (!inningsData) return '';

            // Calculate mock extras/total if not provided in JSON
            const extras = inningsData.extras || "0 (b 0, lb 0, w 0, nb 0, p 0)";
            const rr = (parseFloat(inningsData.score.split('/')[0]) / parseFloat(inningsData.overs)).toFixed(2);
            const runRateStr = isNaN(rr) ? '0.00' : rr;

            return `
                <div class="innings-header">
                    <h2>${inningsData.team} Innings</h2>
                    <div class="innings-score">${inningsData.score} <span style="font-size: 14px; font-weight: normal; color: #555;">(${inningsData.overs} Ov)</span></div>
                </div>
                
                <table class="score-table">
                    <thead>
                        <tr>
                            <th>Batter</th>
                            <th></th>
                            <th class="num">R</th>
                            <th class="num">B</th>
                            <th class="num">4s</th>
                            <th class="num">6s</th>
                            <th class="num">SR</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${renderBattingRows(inningsData.batting)}
                        <tr class="extra-row">
                            <td>Extras</td>
                            <td colspan="6">${extras}</td>
                        </tr>
                        <tr class="total-row">
                            <td>Total</td>
                            <td colspan="6">${inningsData.score} (${inningsData.overs} Ov) <span style="font-weight: normal; margin-left: 15px;">RR: ${runRateStr}</span></td>
                        </tr>
                    </tbody>
                </table>

                <div class="innings-footer-info">
                    <span class="label">Did not bat:</span>
                    <span class="content">Data not available</span>
                </div>
                <div class="innings-footer-info" style="margin-bottom: 20px;">
                    <span class="label">Fall of wickets:</span>
                    <span class="content">Data not available</span>
                </div>

                <table class="score-table">
                    <thead>
                        <tr>
                            <th>Bowler</th>
                            <th class="num">O</th>
                            <th class="num">M</th>
                            <th class="num">R</th>
                            <th class="num">W</th>
                            <th class="num">NB</th>
                            <th class="num">WD</th>
                            <th class="num">ECO</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${renderBowlingRows(inningsData.bowling)}
                    </tbody>
                </table>
            `;
        }

        async function loadScoreboard() {
            const urlParams = new URLSearchParams(window.location.search);
            const matchId = urlParams.get('id');

            if (!matchId) {
                document.getElementById('loading-state').style.display = 'none';
                document.getElementById('error-state').style.display = 'block';
                return;
            }

            // Fetch player profiles to resolve retroactively
            try {
                const { data: playerProfiles } = await supabase
                    .from('player_stats')
                    .select('id, name, image_url');
                
                if (playerProfiles) {
                    playerProfiles.forEach(p => {
                        playerMap[p.name.toLowerCase().trim()] = {
                            id: p.id,
                            image_url: p.image_url
                        };
                    });
                }
            } catch (e) {
                console.error("Failed to load player profiles for scorecard mapping", e);
            }

            const { data, error } = await supabase
                .from('matches')
                .select('*')
                .eq('id', matchId)
                .single();

            document.getElementById('loading-state').style.display = 'none';

            if (error || !data) {
                document.getElementById('error-state').style.display = 'block';
                return;
            }

            if (!data.scoreboard) {
                document.getElementById('no-data-state').style.display = 'block';
                return;
            }

            const sb = data.scoreboard;

            // Match Header Info
            document.getElementById('match-title').textContent = `${data.team1_name} vs ${data.team2_name}, Match ${data.match_number || '-'} - Live Cricket Score`;
            
            // Priority: Summary -> Toss
            document.getElementById('match-status-text').textContent = data.summary || sb.toss || '';

            // Match Info Bar
            let infoItems = [];
            if(data.tournament_name) infoItems.push(`<span><strong>Tournament:</strong> ${data.tournament_name}</span>`);
            if(data.venue) infoItems.push(`<span><strong>Venue:</strong> ${data.venue}</span>`);
            if(data.match_date) {
                const dt = new Date(data.match_date);
                infoItems.push(`<span><strong>Date:</strong> ${dt.toLocaleDateString()} ${dt.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>`);
            }
            if(sb.umpire1 || sb.umpire2) {
                let u = [sb.umpire1, sb.umpire2].filter(Boolean).join(', ');
                infoItems.push(`<span><strong>Umpires:</strong> ${u}</span>`);
            }
            if(sb.mom) infoItems.push(`<span><strong>Man of the Match:</strong> <span style="color: #22c55e; font-weight: 700;">${sb.mom}</span></span>`);
            
            document.getElementById('match-info-details').innerHTML = infoItems.join('<span class="info-sep">•</span>');

            // Render Innings with Tabs
            let tabsHtml = '<div class="innings-tabs">';
            let inningsHtml = '';
            
            // Determine active tab. Usually Innings 2 is active if it exists
            const hasInn2 = sb.innings2 && sb.innings2.team && (sb.innings2.batting.length > 0 || sb.innings2.bowling.length > 0 || sb.innings2.score);
            
            if (sb.innings1 && sb.innings1.team) {
                const isActive = !hasInn2;
                tabsHtml += `<button class="innings-tab ${isActive ? 'active' : ''}" onclick="window.switchInnings('inn1', event)">${sb.innings1.team} Innings</button>`;
                inningsHtml += `<div id="inn1-content" class="innings-section ${isActive ? 'active' : ''}">` + generateInningsHTML(sb.innings1) + `</div>`;
            }
            if (hasInn2) {
                const isActive = true;
                tabsHtml += `<button class="innings-tab ${isActive ? 'active' : ''}" onclick="window.switchInnings('inn2', event)">${sb.innings2.team} Innings</button>`;
                inningsHtml += `<div id="inn2-content" class="innings-section ${isActive ? 'active' : ''}">` + generateInningsHTML(sb.innings2) + `</div>`;
            }
            
            tabsHtml += '</div>';

            document.getElementById('innings-wrapper').innerHTML = tabsHtml + inningsHtml;
            document.getElementById('scoreboard-container').style.display = 'block';
            
            // Global function to switch tabs
            window.switchInnings = function(id, event) {
                document.querySelectorAll('.innings-tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.innings-section').forEach(s => s.classList.remove('active'));
                
                event.currentTarget.classList.add('active');
                document.getElementById(id + '-content').classList.add('active');
            };
        }

        async function initApp() {
            initGA();
            initCookies();
            await loadComponent("notice-placeholder", "components/notice-ticker.html");
            await loadComponent("navbar-placeholder", "components/navbar.html");
            initNavbar();
            await loadComponent("footer-placeholder", "components/footer.html");
            
            await loadScoreboard();
        }

        initApp();
    </script>
</body>
</html>
