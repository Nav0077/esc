<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Social Club | Club Gallery & Moments</title>
    <meta name="description" content="Explore photos, celebrations, events, and unforgettable moments from the Elite Social Club cricket tournaments and gatherings.">
    <meta property="og:title" content="Elite Social Club | Club Gallery">
    <meta property="og:description" content="Explore celebrations, match moments, and events from ESC.">
    <meta property="og:url" content="https://elite-social-club.vercel.app/gallery.html">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%2322c55e'/><text x='50' y='65' font-family='Arial' font-weight='bold' font-size='35' fill='white' text-anchor='middle'>ESC</text></svg>">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/cookies.css">
    <link rel="stylesheet" href="css/gallery.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="gallery-page">

    <!-- Notice Bar -->
    <div id="notice-placeholder"></div>

    <!-- Navbar -->
    <div id="navbar-placeholder"></div>

    <!-- Dark Overlay for Mobile Menu -->
    <div class="nav-overlay" id="nav-overlay"></div>

    <main class="container" style="flex: 1;">
        <section class="gallery-hero">
            <h1>Club Moments & Events</h1>
            <p>Capturing the elite spirit, thrilling matches, practice sessions, and championship celebrations of our vibrant club community.</p>
            
            <div class="gallery-filters" id="gallery-filters">
                <button class="filter-btn active" data-filter="all">All Photos</button>
                <button class="filter-btn" data-filter="Club Moments">Club Moments</button>
                <button class="filter-btn" data-filter="Events">Events</button>
                <button class="filter-btn" data-filter="Matches">Matches</button>
                <button class="filter-btn" data-filter="Practice">Practice</button>
                <button class="filter-btn" data-filter="Celebration">Celebration</button>
            </div>
        </section>

        <section class="gallery-grid" id="gallery-grid">
            <!-- Gallery items dynamically inserted here -->
            <p style="grid-column: 1/-1; text-align: center; color: #94a3b8; font-size: 18px; padding: 60px;">Loading beautiful moments...</p>
        </section>
    </main>

    <!-- Lightbox Modal -->
    <div class="lightbox-modal" id="lightbox-modal">
        <button class="lightbox-close" id="lightbox-close" aria-label="Close Lightbox">&times;</button>
        <div class="lightbox-content">
            <div class="lightbox-img-container">
                <img id="lightbox-img" class="lightbox-img" src="" alt="Moment image">
            </div>
            <div class="lightbox-info">
                <div class="category-badge" id="lightbox-category">Category</div>
                <h2 class="lightbox-title" id="lightbox-title">Title</h2>
                <div class="lightbox-date" id="lightbox-date">Date</div>
                <div class="lightbox-desc" id="lightbox-desc">Description</div>
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script type="module">
        import { initNavbar } from "./js/navbar.js";
        import { supabase } from "./js/supabase_client.js";
        import { initGA } from './js/analytics.js';
        import { initCookies } from './js/cookies.js';

        let allGalleryItems = [];

        async function loadComponent(id, file) {
            try {
                const res = await fetch(file);
                if (!res.ok) throw new Error(`Failed to load ${file}`);
                const content = await res.text();
                const element = document.getElementById(id);
                if (element) {
                    element.innerHTML = '';
                    const range = document.createRange();
                    const fragment = range.createContextualFragment(content);
                    element.appendChild(fragment);
                }
                return content;
            } catch (error) {
                console.error("Error loading component:", error);
            }
        }

        async function fetchGallery() {
            const { data, error } = await supabase
                .from('gallery')
                .select('*')
                .order('event_date', { ascending: false });
            
            if (error) {
                console.error('Error fetching gallery:', error);
                return [];
            }
            return data;
        }

        function renderGalleryCards(filter) {
            const grid = document.getElementById('gallery-grid');
            const items = filter === 'all'
                ? allGalleryItems
                : allGalleryItems.filter(item => item.category === filter);

            if (items.length === 0) {
                grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 80px 20px; color: #64748b; font-size: 18px;">
                    <svg style="margin: 0 auto 16px; width: 64px; height: 64px; opacity: 0.5;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                    No moments found in this category yet. Check back soon!
                </div>`;
                return;
            }

            grid.innerHTML = items.map(item => {
                const dateStr = new Date(item.event_date).toLocaleDateString('en-US', {
                    month: 'short',
                    day: 'numeric',
                    year: 'numeric'
                });
                return `
                <div class="gallery-card" data-id="${item.id}">
                    <img src="${item.image_url}" alt="${item.title}" class="gallery-image" loading="lazy">
                    <div class="gallery-overlay">
                        <div class="category-badge">${item.category}</div>
                        <h3 class="gallery-title">${item.title}</h3>
                        <div class="gallery-date">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                            ${dateStr}
                        </div>
                        ${item.description ? `<p class="gallery-desc-preview">${item.description}</p>` : ''}
                    </div>
                </div>
                `;
            }).join('');

            // Add click listeners to cards for lightbox
            document.querySelectorAll('.gallery-card').forEach(card => {
                card.addEventListener('click', () => {
                    const id = card.getAttribute('data-id');
                    const target = allGalleryItems.find(x => x.id === id);
                    if (target) openLightbox(target);
                });
            });
        }

        function openLightbox(item) {
            const modal = document.getElementById('lightbox-modal');
            document.getElementById('lightbox-img').src = item.image_url;
            document.getElementById('lightbox-category').textContent = item.category;
            document.getElementById('lightbox-title').textContent = item.title;
            
            const dateStr = new Date(item.event_date).toLocaleDateString('en-US', {
                month: 'long',
                day: 'numeric',
                year: 'numeric'
            });
            document.getElementById('lightbox-date').innerHTML = `<strong>Event Date:</strong> ${dateStr}`;
            
            const descEl = document.getElementById('lightbox-desc');
            if (item.description) {
                descEl.textContent = item.description;
                descEl.style.display = 'block';
            } else {
                descEl.style.display = 'none';
            }

            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            document.getElementById('lightbox-modal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        async function init() {
            initGA();
            initCookies();
            await Promise.all([
                loadComponent("notice-placeholder", "components/notice-ticker.html"),
                loadComponent("navbar-placeholder", "components/navbar.html"),
                loadComponent("footer-placeholder", "components/footer.html")
            ]);
            initNavbar();

            allGalleryItems = await fetchGallery();
            renderGalleryCards('all');

            // Setup filters
            const filterBtns = document.querySelectorAll('.filter-btn');
            filterBtns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    filterBtns.forEach(b => b.classList.remove('active'));
                    e.currentTarget.classList.add('active');
                    renderGalleryCards(e.currentTarget.getAttribute('data-filter'));
                });
            });

            // Lightbox closing mechanisms
            document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
            document.getElementById('lightbox-modal').addEventListener('click', (e) => {
                if (e.target === document.getElementById('lightbox-modal')) {
                    closeLightbox();
                }
            });
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') closeLightbox();
            });
        }

        init();
    </script>
</body>
</html>
