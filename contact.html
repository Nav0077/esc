<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Social Club | Contact Us</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/about-contact.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Notice Bar -->
    <div id="notice-placeholder"></div>

    <!-- Navbar -->
    <div id="navbar-placeholder"></div>

    <!-- Dark Overlay for Mobile Menu -->
    <div class="nav-overlay" id="nav-overlay"></div>

    <main class="container">
        
        <div class="page-header">
            <h1>Get In Touch</h1>
            <p>Have questions about our tournaments, want to join the club, or need support? We'd love to hear from you.</p>
        </div>

        <section class="contact-wrapper">
            <!-- Contact Info -->
            <div class="contact-info">
                <h3>Contact Information</h3>
                
                <div class="contact-detail">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                    <div>
                        <strong>Phone</strong>
                        <p>+977 (123) 456-7890</p>
                    </div>
                </div>

                <div class="contact-detail">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                    <div>
                        <strong>Email</strong>
                        <p>info@elitesocialclub.com</p>
                    </div>
                </div>

                <div class="contact-detail">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                    <div>
                        <strong>Location</strong>
                        <p>Elite Sports Ground<br>Kathmandu, Nepal</p>
                    </div>
                </div>
            </div>

            <!-- Contact Form -->
            <div class="contact-form">
                <form id="contact-form" onsubmit="event.preventDefault(); alert('Thank you for your message. We will get back to you soon!'); this.reset();">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                        <div class="form-group">
                            <label>First Name</label>
                            <input type="text" class="form-control" required placeholder="John">
                        </div>
                        <div class="form-group">
                            <label>Last Name</label>
                            <input type="text" class="form-control" required placeholder="Doe">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" class="form-control" required placeholder="john@example.com">
                    </div>

                    <div class="form-group">
                        <label>Subject</label>
                        <input type="text" class="form-control" required placeholder="How can we help you?">
                    </div>

                    <div class="form-group">
                        <label>Message</label>
                        <textarea class="form-control" required placeholder="Write your message here..."></textarea>
                    </div>

                    <button type="submit" class="btn">Send Message</button>
                </form>
            </div>
        </section>

    </main>

    <!-- Footer -->
    <div id="footer-placeholder"></div>

    <!-- Scripts -->
    <script type="module">
        import { initNavbar } from "./js/navbar.js";

        async function loadComponent(id, file) {
            try {
                const res = await fetch(file);
                if (!res.ok) throw new Error(`Failed to load ${file}`);
                const content = await res.text();
                const element = document.getElementById(id);
                if (element) element.innerHTML = content;
                return content;
            } catch (error) {
                console.error("Error loading component:", error);
            }
        }

        async function initApp() {
            await loadComponent("notice-placeholder", "components/notice-ticker.html");
            await loadComponent("navbar-placeholder", "components/navbar.html");
            initNavbar();
            
            // Set active state in navbar
            const links = document.querySelectorAll('.nav-link');
            links.forEach(l => l.classList.remove('active'));
            const contactLink = Array.from(links).find(l => l.getAttribute('href') === '/contact.html');
            if (contactLink) contactLink.classList.add('active');

            await loadComponent("footer-placeholder", "components/footer.html");
        }

        initApp();
    </script>
</body>
</html>
