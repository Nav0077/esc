<div class="promo-modal" id="promo-modal">
    <div class="promo-content">
        <button class="promo-close" id="promo-close">&times;</button>
        
        <div class="promo-carousel" id="promo-carousel">
            <!-- Slides will be injected here -->
        </div>

        <div class="promo-footer" id="promo-footer">
            <div class="carousel-dots" id="carousel-dots">
                <!-- Dots will be injected here -->
            </div>
            <a href="#" class="promo-btn" id="promo-action-btn" style="margin-top: 20px; display: none;">Learn More</a>
        </div>
    </div>
</div>

<script>
    (function() {
        const modal = document.getElementById('promo-modal');
        const closeBtn = document.getElementById('promo-close');
        const carousel = document.getElementById('promo-carousel');
        const dotsContainer = document.getElementById('carousel-dots');
        const actionBtn = document.getElementById('promo-action-btn');
        
        let currentSlide = 0;
        let slides = [];
        let autoPlayInterval;

        window.initPromoPopup = function(data) {
            if (!data || !data.image_urls || data.image_urls.length === 0) return;

            // Check if already shown this session if frequency is once_per_session
            if (data.display_frequency === 'once_per_session') {
                if (sessionStorage.getItem('promo_shown_' + data.id)) return;
                sessionStorage.setItem('promo_shown_' + data.id, 'true');
            }

            // Set Action Link
            if (data.link_url) {
                actionBtn.href = data.link_url;
                actionBtn.style.display = 'inline-block';
            }

            // Inject Slides
            carousel.innerHTML = data.image_urls.map((url, i) => `
                <div class="promo-slide ${i === 0 ? 'active' : ''}">
                    <img src="${url}" alt="Promo Image ${i + 1}">
                </div>
            `).join('');

            // Inject Dots if more than 1 slide
            if (data.image_urls.length > 1) {
                dotsContainer.innerHTML = data.image_urls.map((_, i) => `
                    <div class="dot ${i === 0 ? 'active' : ''}" data-index="${i}"></div>
                `).join('');

                // Dot click events
                document.querySelectorAll('.dot').forEach(dot => {
                    dot.addEventListener('click', () => {
                        goToSlide(parseInt(dot.getAttribute('data-index')));
                    });
                });

                // Start Auto-play
                startAutoPlay();
            } else {
                dotsContainer.style.display = 'none';
            }

            slides = document.querySelectorAll('.promo-slide');

            // Show Modal after small delay
            setTimeout(() => {
                modal.classList.add('active');
            }, 1000);
        };

        function goToSlide(n) {
            slides[currentSlide].classList.remove('active');
            document.querySelectorAll('.dot')[currentSlide]?.classList.remove('active');
            
            currentSlide = n;
            
            slides[currentSlide].classList.add('active');
            document.querySelectorAll('.dot')[currentSlide]?.classList.add('active');
        }

        function nextSlide() {
            let next = (currentSlide + 1) % slides.length;
            goToSlide(next);
        }

        function startAutoPlay() {
            autoPlayInterval = setInterval(nextSlide, 4000);
        }

        closeBtn.addEventListener('click', () => {
            modal.classList.remove('active');
            clearInterval(autoPlayInterval);
        });

        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.classList.remove('active');
                clearInterval(autoPlayInterval);
            }
        });
    })();
</script>
