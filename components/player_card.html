<div class="player-card" data-category="{{CATEGORY}}">
  <div class="card-top">
    <img src="{{IMAGE_URL}}" class="player-img" />

    <div class="player-info">
      <h3>{{NAME}}</h3>
      <span class="role">{{ROLE}}</span>
    </div>

    <span class="tag">{{TAG}}</span>
  </div>

  <div class="card-stats">
    <div>
      <p>MAT</p>
      <h4>{{MAT}}</h4>
    </div>
    <div>
      <p>RUNS</p>
      <h4>{{RUNS}}</h4>
    </div>
    <div>
      <p>WKTS</p>
      <h4>{{WKTS}}</h4>
    </div>
    <div>
      <p>HS</p>
      <h4>{{HS}}</h4>
    </div>
    <div>
      <p>B-AVG</p>
      <h4>{{AVG}}</h4>
    </div>
    <div>
      <p>S/R</p>
      <h4>{{SR}}</h4>
    </div>
    <div>
      <p>BW-AVG</p>
      <h4>{{BW_AVG}}</h4>
    </div>
    <div>
      <p>BEST</p>
      <h4>{{BEST}}</h4>
    </div>
  </div>

  <div class="card-recent-form">
    <p>RECENT FORM</p>
    <div class="form-indicators">
      {{RECENT_FORM}}
    </div>
  </div>

  <div class="card-footer">
    <a href="player-profile.html?id={{ID}}">View Full Profile →</a>
  </div>
</div>
