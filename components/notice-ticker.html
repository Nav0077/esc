<div class="notice-ticker" id="notice-ticker-app" style="display: none;">
    <div class="ticker-container">
        <!-- Fixed Label -->
        <div class="ticker-label">
            <span class="dot"></span> 
            <span class="label-text">LATEST</span>
        </div>
        
        <!-- Scrolling Content -->
        <div class="ticker-content">
            <div class="ticker-text" id="ticker-text">
                Loading latest updates...
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { supabase } from '../js/supabase_client.js';

    async function initTicker() {
        try {
            const { data, error } = await supabase
                .from('notifications')
                .select('*')
                .order('created_at', { ascending: false })
                .limit(1);

            if (!error && data && data.length > 0) {
                const notice = data[0];
                const textEl = document.getElementById('ticker-text');
                const tickerApp = document.getElementById('notice-ticker-app');
                
                if (textEl && tickerApp) {
                    textEl.innerHTML = `<strong>${notice.title}:</strong> ${notice.message} &nbsp;&nbsp;&nbsp;&nbsp; | &nbsp;&nbsp;&nbsp;&nbsp; 🏆 Elite Social Club: Your premier destination for cricket analytics.`;
                    tickerApp.style.display = 'block';
                }
            }
        } catch (err) {
            console.error("Ticker Error:", err);
        }
    }

    initTicker();
</script>
