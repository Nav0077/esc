<div class="match-card" style="border-left: 4px solid #22c55e;">
    <div class="card-top">
        <span>{{TOURNAMENT_NAME}} • MATCH {{MATCH_NUMBER}}</span>
        <span class="status-badge live">Live</span>
    </div>
    <div class="team-row">
        <div class="team-meta"><img src="{{TEAM1_LOGO}}" class="team-logo"> {{TEAM1_NAME}}</div>
        <div class="score-info">{{TEAM1_SCORE}} <span class="overs-text">{{TEAM1_OVERS}}</span></div>
    </div>
    <div class="team-row">
        <div class="team-meta"><img src="{{TEAM2_LOGO}}" class="team-logo"> {{TEAM2_NAME}}</div>
        <div class="score-info" style="color:#9ca3af; font-weight: 400;">{{TEAM2_SCORE}} <span class="overs-text">{{TEAM2_OVERS}}</span></div>
    </div>
    <div class="card-footer live-footer">
        {{SUMMARY}}
        <div style="font-size: 11px; margin-top: 4px; opacity: 0.8;">Venue: {{VENUE}}</div>
    </div>
</div>
