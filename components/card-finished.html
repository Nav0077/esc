<div class="match-card">
    <div class="card-top">
        <span>{{TOURNAMENT_NAME}} • MATCH {{MATCH_NUMBER}}</span>
        <span class="status-badge">Finished</span>
    </div>
    <div class="team-row">
        <div class="team-meta"><img src="{{TEAM1_LOGO}}" class="team-logo"> {{TEAM1_NAME}}</div>
        <div class="score-info">{{TEAM1_SCORE}} <span class="overs-text">{{TEAM1_OVERS}}</span></div>
    </div>
    <div class="team-row">
        <div class="team-meta"><img src="{{TEAM2_LOGO}}" class="team-logo"> {{TEAM2_NAME}}</div>
        <div class="score-info">{{TEAM2_SCORE}} <span class="overs-text">{{TEAM2_OVERS}}</span></div>
    </div>
    <div class="card-footer">{{SUMMARY}}</div>
</div>
