<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Social Club | Tournament Details</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%2322c55e'/><text x='50' y='65' font-family='Arial' font-weight='bold' font-size='35' fill='white' text-anchor='middle'>ESC</text></svg>">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/tournament-details.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Notice Bar -->
    <div id="notice-placeholder"></div>

    <!-- Navbar -->
    <div id="navbar-placeholder"></div>

    <!-- Dark Overlay for Mobile Menu -->
    <div class="nav-overlay" id="nav-overlay"></div>

    <main class="container">

        <div id="tournament-data-container" style="display: none;">
            <!-- Tournament Header -->
            <div class="tourney-header">
                <div class="tourney-title" id="t-title">Loading...</div>
                <div class="tourney-meta" id="t-meta">Loading...</div>
            </div>

            <!-- Navigation Tabs -->
            <div class="tourney-nav">
                <button class="tourney-tab active" data-target="matches-panel">Matches</button>
                <button class="tourney-tab" data-target="standings-panel">Points Table</button>
                <button class="tourney-tab" data-target="stats-panel">Stats</button>
            </div>
        </div>

        <!-- ========================================== -->
        <!-- MATCHES PANEL -->
        <!-- ========================================== -->
        <div id="matches-panel" class="tourney-panel active">
            <h2 style="margin-top: 0; margin-bottom: 24px; font-size: 20px;">Tournament Matches</h2>
            <div class="matches-grid" id="all-matches-grid">
                <!-- Matches will be dynamically loaded here -->
            </div>
            <div id="loading-matches" style="text-align: center; padding: 40px; color: #6b7280;">Loading matches...</div>
        </div>

        <!-- ========================================== -->
        <!-- STANDINGS PANEL -->
        <!-- ========================================== -->
        <div id="standings-panel" class="tourney-panel">
            <h2 style="margin-top: 0; margin-bottom: 24px; font-size: 20px;">Points Table</h2>
            <div style="overflow-x: auto;">
                <table class="standings-table">
                    <thead>
                        <tr>
                            <th>Teams</th>
                            <th class="num">Mat</th>
                            <th class="num">Won</th>
                            <th class="num">Lost</th>
                            <th class="num hide-mobile">Tied</th>
                            <th class="num hide-mobile">NR</th>
                            <th class="num">Pts</th>
                            <th class="num">NRR</th>
                        </tr>
                    </thead>
                    <tbody id="standings-body">
                        <!-- Rendered via JS -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- ========================================== -->
        <!-- STATS PANEL -->
        <!-- ========================================== -->
        <div id="stats-panel" class="tourney-panel">
            <h2 style="margin-top: 0; margin-bottom: 24px; font-size: 20px;">Tournament Stats</h2>
            
            <div class="stats-grid">
                <!-- Most Runs Widget -->
                <div class="stat-widget" id="runs-widget">
                    <div class="stat-widget-header">Most Runs</div>
                    <div id="runs-list"></div>
                </div>

                <!-- Most Wickets Widget -->
                <div class="stat-widget" id="wickets-widget">
                    <div class="stat-widget-header">Most Wickets</div>
                    <div id="wickets-list"></div>
                </div>
            </div>
        </div>

    </main>

    <div id="footer-placeholder"></div>

    <script type="module">
        import { initNavbar } from "./js/navbar.js";
        import { supabase } from "./js/supabase_client.js";

        // UI Tabs Logic
        document.querySelectorAll('.tourney-tab').forEach(tab => {
            tab.addEventListener('click', (e) => {
                document.querySelectorAll('.tourney-tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tourney-panel').forEach(p => p.classList.remove('active'));
                
                e.target.classList.add('active');
                document.getElementById(e.target.getAttribute('data-target')).classList.add('active');
            });
        });

        // Load HTML Components
        async function loadComponent(id, file) {
            try {
                const res = await fetch(file);
                if (!res.ok) throw new Error(`Failed to load ${file}`);
                const content = await res.text();
                const element = document.getElementById(id);
                if (element) element.innerHTML = content;
                return content;
            } catch (error) {
                console.error("Error loading component:", error);
            }
        }

        function renderMatchCard(match, template) {
            let card = template;
            card = card.replace(/T20 CUP • MATCH 14|LEAGUE A • MATCH 12|T20 CUP • MATCH 15/, `${match.tournament_name} • MATCH ${match.match_number}`);
            
            card = card.replace('Falcons', match.team1_name);
            card = card.replace('Strikers', match.team2_name);
            card = card.replace('Royals', match.team1_name);
            card = card.replace('Titans', match.team2_name);
            card = card.replace('Spartans', match.team1_name);
            card = card.replace('Knights', match.team2_name);

            if (match.team1_logo) card = card.replace('https://via.placeholder.com/24', match.team1_logo);
            if (match.team2_logo) card = card.replace('https://via.placeholder.com/24', match.team2_logo);

            card = card.replace('145/6', match.team1_score || '-');
            card = card.replace('Yet to bat', match.team2_score || 'Yet to bat');
            card = card.replace('140/8', match.team1_score || '-');
            card = card.replace('144/4', match.team2_score || '-');
            
            card = card.replace('(18.4)', match.team1_overs ? `(${match.team1_overs})` : '');
            card = card.replace('(20.0)', match.team1_overs ? `(${match.team1_overs})` : '');
            card = card.replace('(19.2)', match.team2_overs ? `(${match.team2_overs})` : '');

            card = card.replace('Falcons elect to bat', match.summary || '');
            card = card.replace('Titans won by 6 wickets', match.summary || '');
            card = card.replace('Starts tomorrow at 14:00', match.summary || '');

            return `<a href="scoreboard.html?id=${match.id}" style="text-decoration: none; color: inherit; display: block;">${card}</a>`;
        }

        async function loadMatches() {
            const { data, error } = await supabase
                .from('matches')
                .select('*')
                .order('match_date', { ascending: false });
            
            document.getElementById('loading-matches').style.display = 'none';

            if (error || !data || data.length === 0) {
                document.getElementById('all-matches-grid').innerHTML = '<p>No matches found.</p>';
                return;
            }

            const liveTemplate = await (await fetch('components/card-live.html')).text();
            const finishedTemplate = await (await fetch('components/card-finished.html')).text();
            const upcomingTemplate = await (await fetch('components/card-upcoming.html')).text();

            const grid = document.getElementById('all-matches-grid');
            let html = '';

            data.forEach(match => {
                let tmpl = upcomingTemplate;
                if(match.status === 'live') tmpl = liveTemplate;
                if(match.status === 'finished') tmpl = finishedTemplate;
                
                html += renderMatchCard(match, tmpl);
            });

            grid.innerHTML = html;
        }

        async function loadTournamentData() {
            const { data, error } = await supabase.from('tournaments').select('*').limit(1).single();
            if(error || !data) {
                console.error("No tournament found");
                return;
            }

            document.getElementById('tournament-data-container').style.display = 'block';
            document.getElementById('t-title').textContent = data.name;
            document.getElementById('t-meta').textContent = `${data.dates} • ${data.location}`;

            // Render Points Table
            if(data.points_table) {
                let html = '';
                data.points_table.forEach(team => {
                    html += `
                        <tr>
                            <td>
                                <div class="team-name-cell">
                                    <img src="${team.logo || 'https://via.placeholder.com/24'}" alt="${team.team}"> ${team.team}
                                </div>
                            </td>
                            <td class="num">${team.mat}</td>
                            <td class="num">${team.won}</td>
                            <td class="num">${team.lost}</td>
                            <td class="num hide-mobile">${team.tied}</td>
                            <td class="num hide-mobile">${team.nr}</td>
                            <td class="num" style="font-weight: 700;">${team.pts}</td>
                            <td class="num">${team.nrr}</td>
                        </tr>
                    `;
                });
                document.getElementById('standings-body').innerHTML = html;
            }

            // Render Stats
            if(data.top_stats) {
                if(data.top_stats.most_runs) {
                    document.getElementById('runs-list').innerHTML = data.top_stats.most_runs.map(p => `
                        <div class="stat-list-item">
                            <div class="stat-player">
                                <img src="https://via.placeholder.com/40" alt="Player">
                                <div class="stat-player-info">
                                    <h4>${p.name}</h4>
                                    <p>${p.team}</p>
                                </div>
                            </div>
                            <div class="stat-value">${p.value}</div>
                        </div>
                    `).join('');
                }
                if(data.top_stats.most_wickets) {
                    document.getElementById('wickets-list').innerHTML = data.top_stats.most_wickets.map(p => `
                        <div class="stat-list-item">
                            <div class="stat-player">
                                <img src="https://via.placeholder.com/40" alt="Player">
                                <div class="stat-player-info">
                                    <h4>${p.name}</h4>
                                    <p>${p.team}</p>
                                </div>
                            </div>
                            <div class="stat-value">${p.value}</div>
                        </div>
                    `).join('');
                }
            }
        }

        async function initApp() {
            await loadComponent("notice-placeholder", "components/notice-ticker.html");
            await loadComponent("navbar-placeholder", "components/navbar.html");
            initNavbar();
            
            const links = document.querySelectorAll('.nav-link');
            links.forEach(l => l.classList.remove('active'));
            const tourneyLink = Array.from(links).find(l => l.getAttribute('href') === '/tournament.html');
            if (tourneyLink) tourneyLink.classList.add('active');

            await loadComponent("footer-placeholder", "components/footer.html");

            await loadTournamentData();
            await loadMatches();
        }

        initApp();
    </script>
</body>
</html>
